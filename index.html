#root { height: 100dvh; display: flex; flex-direction: column; }

/* GAME WRAP */

/* TOPBAR */

.gs-neg-badge { font-size: 9px; color: #ef4444; font-weight: 700; letter-spacing: 1px; }

.gs-mastery-badge { font-size: 9px; color: #f59e0b; font-weight: 700; letter-spacing: 1px; }

/* ADVANCE CONTROLS */
.gs-advance-bar { padding: 8px 14px; display: flex; gap: 8px; align-items: center; flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,0.06); }

.gs-roll-input { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: #e2e8f0; font-family: ‘Share Tech Mono’, monospace; font-size: 13px; padding: 8px 10px; border-radius: 4px; width: 64px; text-align: center; }

.gs-quick { background: transparent; border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.5); font-family: ‘Share Tech Mono’, monospace; font-size: 10px; padding: 8px 10px; border-radius: 4px; cursor: pointer; }

.gs-quick-on { border-color: #22c55e; color: #22c55e; }

.gs-quick-btns { display: flex; gap: 6px; }

.btn-advance { flex: 1; background: transparent; border: 1px solid #22c55e; color: #22c55e; font-family: ‘Share Tech Mono’, monospace; font-size: 11px; letter-spacing: 3px; padding: 10px; border-radius: 4px; cursor: pointer; }

.btn-advance:disabled { opacity: 0.4; }

.gs-tabbar { display: flex; border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; overflow-x: auto; background: #0a0c12; }

.gs-tab { background: transparent; border: none; border-bottom: 2px solid transparent; color: rgba(255,255,255,0.35); font-family: ‘Share Tech Mono’, monospace; font-size: 9px; letter-spacing: 2px; padding: 10px 12px; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 5px; }

.gs-tab-on { color: #22c55e; border-bottom-color: #22c55e; }

.gs-tab-badge { background: #ef4444; color: #fff; border-radius: 8px; padding: 1px 5px; font-size: 8px; }

/* CONTENT */
.gs-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

.gs-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 6px; }

.gs-empty { padding: 40px 20px; text-align: center; color: rgba(255,255,255,0.2); font-size: 11px; letter-spacing: 2px; }

.gs-section-lbl { font-size: 9px; color: rgba(255,255,255,0.25); letter-spacing: 3px; margin-bottom: 8px; margin-top: 4px; }

.gs-count { font-size: 9px; color: rgba(255,255,255,0.3); letter-spacing: 1px; margin-bottom: 6px; }

.gs-filter-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }

.gs-filter-row input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #e2e8f0; font-family: ‘Share Tech Mono’, monospace; font-size: 11px; padding: 8px 10px; border-radius: 4px; min-width: 0; }

/* TRAIT CARDS (codex) */
.trait-card { border-radius: 6px; padding: 12px 14px; cursor: default; }

.trait-name { font-family: ‘Rajdhani’, sans-serif; font-size: 18px; font-weight: 700; line-height: 1.1; }

.trait-cat { font-size: 9px; color: rgba(255,255,255,0.45); letter-spacing: 1.5px; text-transform: uppercase; }

.trait-prime { font-size: 8px; color: #f59e0b; font-weight: 700; letter-spacing: 2px; }

.trait-bar-row { display: flex; gap: 3px; margin-top: 6px; }

.trait-bar-seg { height: 5px; flex: 1; border-radius: 2px; }

.trait-flavor { font-size: 10px; color: rgba(255,255,255,0.55); font-style: italic; margin-top: 4px; line-height: 1.5; font-family: sans-serif; border-left: 2px solid rgba(255,255,255,0.1); padding-left: 8px; }

.trait-level-col { display: flex; flex-direction: column; align-items: center; min-width: 28px; }

.trait-level { font-family: ‘Rajdhani’, sans-serif; font-size: 26px; font-weight: 700; line-height: 1; }

.trait-prime-badge { font-size: 8px; color: #f59e0b; font-weight: 700; letter-spacing: 2px; margin-bottom: 3px; }

.trait-cat-pill { font-size: 9px; color: rgba(255,255,255,0.4); letter-spacing: 1px; margin-bottom: 4px; }

.mastery-stamp { width: 44px; height: 44px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }

.mastery-stamp-star { font-size: 16px; line-height: 1; }

.mastery-stamp-lbl { font-size: 7px; font-weight: 700; letter-spacing: 1px; margin-top: 1px; }

.trait-max-label { font-family: ‘Rajdhani’, sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 2px; }

/* CHEVRON BADGE */
.chev-badge { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 44px; height: 44px; border-radius: 6px; flex-shrink: 0; }

.chev-tier { font-size: 8px; font-weight: 700; letter-spacing: 1px; margin-top: 2px; }

/* MASTERY COIN */
.mastery-coin { width: 44px; height: 44px; border-radius: 50%; border: 2px solid; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

/* LOG */

/* ASCENDANCY */
.asc-card { border-radius: 6px; padding: 12px 14px; border: 1px solid rgba(255,255,255,0.06); }

.asc-num { font-size: 8px; color: rgba(255,255,255,0.3); letter-spacing: 2px; margin-bottom: 6px; }

.codex-card { border-radius: 6px; padding: 12px 14px; }

/* SYNERGY */
.syn-card { border-radius: 6px; padding: 12px 14px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 6px; }

.syn-name { font-family: ‘Rajdhani’, sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 3px; }

.syn-traits { font-size: 10px; color: rgba(255,255,255,0.5); }

.syn-pp { font-size: 8px; color: #f59e0b; letter-spacing: 1px; margin-bottom: 3px; }

.prox-card { border-radius: 4px; padding: 10px 12px; border: 1px solid rgba(255,255,255,0.07); margin-bottom: 4px; }

.prox-name { font-family: ‘Rajdhani’, sans-serif; font-size: 14px; font-weight: 700; }

.prox-pct { font-family: ‘Rajdhani’, sans-serif; font-size: 14px; font-weight: 700; }

.prox-sub { font-size: 9px; color: rgba(255,255,255,0.35); margin-top: 3px; }

.prox-header { display: flex; justify-content: space-between; align-items: center; }

/* STATS */

/* FILTERS */
.btn-filter { background: transparent; border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.4); font-family: ‘Share Tech Mono’, monospace; font-size: 9px; padding: 6px 10px; border-radius: 3px; cursor: pointer; }

.btn-filter.active { border-color: #22c55e; color: #22c55e; }

/* INIT SCREEN */
.btn-main { display: block; width: 100%; padding: 16px 24px; background: transparent; border: 1px solid #22c55e; color: #22c55e; font-family: ‘Share Tech Mono’, monospace; font-size: 12px; letter-spacing: 4px; border-radius: 4px; cursor: pointer; }

/* CODEX specific */
.codex-flavor { font-size: 10px; color: rgba(255,255,255,0.55); font-style: italic; margin-top: 4px; line-height: 1.5; font-family: sans-serif; border-left: 2px solid rgba(255,255,255,0.1); padding-left: 8px; }

.codex-flavor-locked { font-size: 10px; color: rgba(255,255,255,0.2); font-style: italic; margin-top: 4px; line-height: 1.5; font-family: sans-serif; }

.codex-level-num { font-family: ‘Rajdhani’, sans-serif; font-size: 24px; font-weight: 700; line-height: 1; text-align: center; }

.codex-locked { font-size: 9px; color: rgba(255,255,255,0.2); letter-spacing: 2px; text-align: center; }

.codex-meta { display: flex; gap: 8px; margin-top: 3px; }

.codex-cat { font-size: 9px; color: rgba(255,255,255,0.4); letter-spacing: 1px; text-transform: uppercase; }

.codex-id { font-size: 9px; color: rgba(255,255,255,0.2); }

0%{opacity:1}
50%{opacity:0.3}
100%{opacity:1}

.stat-flash { animation: statFlash 0.4s ease; }

/* DNA SVG animation */
@keyframes dnaFloat {
0%,100% { transform: translateY(0px); }
50%      { transform: translateY(-6px); }
}
@keyframes dnaPulse {
0%,100% { opacity: 0.6; }
50%      { opacity: 1; }
}
@keyframes fadeInUp {
from { opacity: 0; transform: translateY(12px); }
to   { opacity: 1; transform: translateY(0); }
}
@keyframes scanline {
0%   { transform: translateY(-100%); }
100% { transform: translateY(400%); }
}
.init-scanline {
position: absolute;
left: 0; right: 0;
height: 2px;
background: linear-gradient(90deg, transparent, rgba(34,197,94,0.15), transparent);
animation: scanline 4s linear infinite;
pointer-events: none;
z-index: 0;
}
